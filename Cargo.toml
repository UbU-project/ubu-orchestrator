[package]
name = "ubu_orchestrator"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/UbU-project/ubu-orchestrator"
description = "Local async orchestration service for UbU Phase 1 dogfooding."

[dependencies]
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal"] }
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
utoipa = { version = "5", features = ["axum_extras"] }

ubu_core = { git = "https://github.com/UbU-project/ubu-core", rev = "1cc00650b25924ba705eab5ad1730d99304741f2" }
ubu_store = { git = "https://github.com/UbU-project/ubu-store", rev = "18ff5aedbbfb542a0edeffd3be2f16586bb9766d" }
ubu_github_adapter = { git = "https://github.com/UbU-project/ubu-github-adapter", rev = "7783101033d8427096533363ed1822cb958c81c4" }
ubu_planning_core = { git = "https://github.com/UbU-project/ubu-planning-kernel", rev = "3a43795b9d89b992e96c368a6e6842e1e79bcac6", package = "ubu_planning_core" }
ubu_planning_cpu = { git = "https://github.com/UbU-project/ubu-planning-kernel", rev = "3a43795b9d89b992e96c368a6e6842e1e79bcac6", package = "ubu_planning_cpu" }

[dev-dependencies]
http-body-util = "0.1"
